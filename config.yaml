# 个股分析系统配置文件

# 数据配置
data:
  cache_dir: "./cache"
  cache_ttl: 3600  # 缓存有效期（秒）
  
# 输出配置
output:
  html_dir: "./output"
  md_dir: "./output"
  json_dir: "./output"
  
# akshare配置
akshare:
  timeout: 30
  retry: 3
  
# 分析配置
analysis:
  kline_days: 60  # K线数据天数
  ma_periods: [5, 20, 60]  # 均线周期
  
# HTML配置
html:
  theme: "dark"  # dark/light
  chart_height: 480
  
# 日志配置
logging:
  level: "INFO"
  file: "./logs/stock_analysis.log"
